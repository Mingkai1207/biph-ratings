<!doctype html>
<html lang="en" data-i18n-page-title="rank.pageTitle">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rate BIPH — rankings</title>
  <link rel="stylesheet" href="styles.css?v=22926e5" />
  <script src="config.js?v=22926e5"></script>
</head>
<body data-page="rankings">
  <div data-topnav></div>

  <main class="container container--narrow">
    <div class="eyebrow" data-i18n="rank.eyebrow">LEADERBOARD</div>
    <h1 class="page-title serif" data-i18n-html="rank.headingHtml">Teacher <em>rankings</em>.</h1>
    <p class="page-lede" data-i18n="rank.lede">Sorted by student ratings. Only teachers with at least 3 reviews appear here — a single review isn't enough to rank on.</p>

    <div class="ranking-controls">
      <div id="metricChips" class="chips"></div>
      <p id="metricNote" class="ranking-note"></p>
    </div>

    <div id="rankingList" class="ranking-list"></div>
    <div id="rankingEmpty" class="empty" hidden>
      <h2 class="serif" data-i18n="rank.empty.heading">Not enough reviews yet</h2>
      <div data-i18n="rank.empty.body">Once a few teachers pick up 3+ reviews, they'll show up here.</div>
    </div>
  </main>

  <div data-footer></div>
  <script src="app.js?v=22926e5"></script>
  <script>
  (function () {
    const MIN_REVIEWS = 3;

    // For each metric: key on the teacher object, i18n label/note keys.
    // Labels and notes resolve through RB.t() at render time so a language
    // toggle re-renders without re-fetching.
    const METRICS = [
      { key: 'avg_rating',           labelKey: 'rank.metric.overall.label',  noteKey: 'rank.metric.overall.note'  },
      { key: 'avg_teaching_quality', labelKey: 'rank.metric.teaching.label', noteKey: 'rank.metric.teaching.note' },
      { key: 'avg_easygoingness',    labelKey: 'rank.metric.easy.label',     noteKey: 'rank.metric.easy.note'     },
      { key: 'avg_test_difficulty',  labelKey: 'rank.metric.tests.label',    noteKey: 'rank.metric.tests.note'    },
      { key: 'avg_homework_load',    labelKey: 'rank.metric.homework.label', noteKey: 'rank.metric.homework.note' },
    ];

    const state = { metric: METRICS[0], teachers: [] };

    function escape(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    async function init() {
      renderChips();
      try {
        state.teachers = await RB.api('/api/teachers');
      } catch (e) {
        document.getElementById('rankingEmpty').hidden = false;
        return;
      }
      render();
    }

    function renderChips() {
      const host = document.getElementById('metricChips');
      host.innerHTML = '';
      METRICS.forEach(m => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (m.key === state.metric.key ? ' chip--active' : '');
        b.textContent = RB.t(m.labelKey);
        // Compare by metric key (data identity) not text — text changes between
        // languages but the underlying chip mapping is stable.
        b.dataset.metric = m.key;
        b.onclick = () => {
          state.metric = m;
          [...host.children].forEach(c => c.classList.toggle('chip--active', c.dataset.metric === m.key));
          render();
        };
        host.appendChild(b);
      });
    }

    function render() {
      document.getElementById('metricNote').textContent = RB.t(state.metric.noteKey);
      const key = state.metric.key;
      const eligible = state.teachers
        .filter(t => t.review_count >= MIN_REVIEWS && t[key] != null)
        .sort((a, b) => b[key] - a[key]);
      const host = document.getElementById('rankingList');
      const empty = document.getElementById('rankingEmpty');
      host.innerHTML = '';
      if (!eligible.length) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;

      // Rank with ties — teachers tied to 2 decimals share the same rank number.
      let displayRank = 0;
      let lastVal = null;
      let seen = 0;
      eligible.forEach(t => {
        seen += 1;
        // 2-decimal precision in both the display and the tie-break. Fewer
        // accidental ties from 4.92 vs 4.88 both rendering as 4.9.
        const rounded = Math.round(t[key] * 100) / 100;
        if (rounded !== lastVal) {
          displayRank = seen;
          lastVal = rounded;
        }
        const row = document.createElement('a');
        row.className = 'ranking-row';
        row.href = `teacher.html?id=${encodeURIComponent(t.id)}`;
        const medal = displayRank === 1 ? '🥇' : displayRank === 2 ? '🥈' : displayRank === 3 ? '🥉' : '';
        const courses = (t.courses && t.courses.length)
          ? `<span class="ranking-row__courses">${escape(t.courses.slice(0, 2).join(' · '))}${t.courses.length > 2 ? '…' : ''}</span>`
          : '';
        const reviewWord = t.review_count === 1 ? RB.t('rank.review') : RB.t('rank.reviews');
        row.innerHTML = `
          <div class="ranking-row__rank">
            <span class="ranking-row__num">#${displayRank}</span>
            <span class="ranking-row__medal">${medal}</span>
          </div>
          <div class="ranking-row__meta">
            <div class="ranking-row__name serif">${escape(t.name)}</div>
            <div class="ranking-row__sub">${escape(t.subject || '—')}${courses ? ' · ' : ''}${courses}</div>
          </div>
          <div class="ranking-row__score">
            <div class="ranking-row__value">${rounded.toFixed(2)}<small>/5</small></div>
            <div class="ranking-row__count">${t.review_count} ${reviewWord}</div>
          </div>`;
        host.appendChild(row);
      });
    }

    // Re-render chips + rows when language toggles.
    document.addEventListener('rb:lang', () => {
      renderChips();
      if (state.teachers.length) render();
    });

    init();
  })();
  </script>
</body>
</html>
