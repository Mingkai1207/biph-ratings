<!doctype html>
<html lang="en" data-i18n-page-title="home.pageTitle">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rate BIPH — anonymous teacher reviews</title>
  <link rel="stylesheet" href="styles.css?v=22926e5" />
  <script src="config.js?v=22926e5"></script>
</head>
<body data-page="home">
  <div data-topnav></div>

  <main class="container">
    <section class="hero">
      <div class="hero__shapes" aria-hidden="true">
        <span class="hero__shape hero__shape--1"></span>
        <span class="hero__shape hero__shape--2"></span>
        <span class="hero__shape hero__shape--3"></span>
        <span class="hero__shape hero__shape--4"></span>
        <span class="hero__shape hero__shape--5"></span>
        <span class="hero__shape hero__shape--6"></span>
        <span class="hero__shape hero__shape--7"></span>
        <span class="hero__shape hero__shape--8"></span>
      </div>
      <div class="hero__inner">
        <h1 class="hero__title serif" data-i18n-html="home.hero.titleHtml">How is the teacher, <em>honestly</em>?</h1>
        <p class="hero__subtitle" data-i18n="home.hero.subtitle">Real reviews from BIPH students. Anonymous, unfiltered, kind when deserved.</p>
        <form class="searchbar" id="searchForm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink-mute)" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/>
          </svg>
          <input id="q" data-i18n-placeholder="home.search.placeholder" placeholder="Teacher name…" autocomplete="off" />
          <!-- Smart search lives inside the bar as a peer to Go: same input,
               two submit modes. Icon-only keeps the bar compact; the editorial
               hint below the bar explains what it does. -->
          <button class="searchbar__smart" type="button" id="smartBtn"
                  data-i18n-aria-label="home.search.smartAria"
                  data-i18n-title="home.search.smartHint"
                  aria-label="Ask in plain English"
                  title="Ask in plain English: 'best math teacher', 'easiest tests', 'who gives the most homework'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2l1.6 4.4L18 8l-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6L12 2zm6.5 11l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6zM5.5 14l.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7L5.5 14z"/>
            </svg>
          </button>
          <button class="btn btn--primary" type="submit" data-i18n="home.search.go">Go</button>
        </form>
        <p class="hero__smart-hint serif" data-i18n-html="home.search.smartHintHtml">
          <em>Or just ask:</em> <span class="hero__smart-hint__eg">"best math teacher"</span> · <span class="hero__smart-hint__eg">"easiest tests"</span> · <span class="hero__smart-hint__eg">"who gives the most homework"</span>
        </p>
      </div>
    </section>

    <!-- Smart-search explanation banner. Hidden until the user runs a smart
         query. Shows what the AI parsed and a "clear" button to return to
         the normal browse view. -->
    <div class="smart-banner" id="smartBanner" hidden>
      <span class="smart-banner__icon">✨</span>
      <span class="smart-banner__text" id="smartBannerText"></span>
      <button type="button" class="smart-banner__clear" id="smartClear"
              data-i18n="home.smart.clear">Clear smart search</button>
    </div>

    <div class="chips" id="chips"></div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden data-i18n-html="home.empty.html">No teachers match that search. <a href="submit.html">Add one →</a></div>
    <div id="loading" class="loading" data-i18n="home.loading">Loading teachers…</div>
  </main>

  <div data-footer></div>
  <script src="app.js?v=22926e5"></script>
  <script>
  (function () {
    const qInput = document.getElementById('q');
    const form = document.getElementById('searchForm');
    const chipsHost = document.getElementById('chips');
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const loading = document.getElementById('loading');

    // 'All' is a special sentinel — never translated as data, but rendered
    // through RB.t('home.chips.all') when displayed. We keep state.subject
    // as 'All' (the canonical key) so the URL filter logic stays untouched.
    let state = { q: '', subject: 'All', subjects: ['All'], smart: false };
    let debounce;

    async function loadSubjects() {
      const subs = await RB.api('/api/subjects');
      state.subjects = ['All', ...subs];
      renderChips();
    }

    function renderChips() {
      chipsHost.innerHTML = '';
      state.subjects.forEach(s => {
        const b = document.createElement('button');
        b.className = 'chip' + (s === state.subject ? ' chip--active' : '');
        // 'All' is translated via i18n; known English subjects pass through
        // RB.localizeSubject (user-typed ones fall through untranslated).
        // The filter value on state.subject stays English either way.
        b.textContent = s === 'All' ? RB.t('home.chips.all') : RB.localizeSubject(s);
        b.onclick = () => { state.subject = s; renderChips(); loadTeachers(); };
        chipsHost.appendChild(b);
      });
    }

    async function loadTeachers() {
      loading.hidden = false;
      empty.hidden = true;
      const params = new URLSearchParams();
      if (state.q) params.set('q', state.q);
      if (state.subject && state.subject !== 'All') params.set('subject', state.subject);
      try {
        // Cache last fetch so we can re-render on language toggle without re-fetching.
        const rows = await RB.api('/api/teachers' + (params.toString() ? '?' + params : ''));
        lastRows = rows;
        renderGrid(rows);
      } catch (e) {
        grid.innerHTML = '';
        lastRows = null;
        empty.hidden = false;
        empty.textContent = RB.t('home.errLoading', { msg: e.message });
      } finally {
        loading.hidden = true;
      }
    }

    let lastRows = null;

    function renderGrid(rows) {
      grid.innerHTML = '';
      if (!rows.length) {
        empty.hidden = false;
        // Restore the translated empty-state markup (it may have been
        // overwritten by an error message earlier).
        empty.innerHTML = RB.t('home.empty.html');
        return;
      }
      rows.forEach(t => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `teacher.html?id=${encodeURIComponent(t.id)}`;
        // Expose the teacher's avatar color as --aura so hover/focus-visible
        // can render a card-specific drop shadow + border. Each teacher ends
        // up with its own "aura" on the roster.
        card.style.setProperty('--aura', RB.avatarColor(t.name));
        const avg = t.avg_rating;
        const firstCourse = (t.courses && t.courses.length) ? t.courses[0] : null;
        // First course is user content — leave as-is. Otherwise i18n labels.
        const footMeta = firstCourse
          ? escape(firstCourse)
          : (avg != null ? RB.t('home.card.overall') : RB.t('home.card.noReviews'));
        const reviewWord = t.review_count === 1 ? RB.t('home.card.review') : RB.t('home.card.reviews');
        // Only show the %-would-take-again line once we have at least 3
        // responses — a single "yes" showing 100% is misleading.
        const wtaLine = (t.wta_count >= 3 && t.wta_percent != null)
          ? `<div class="card__wta">${RB.t('home.card.wta', { n: t.wta_percent })}</div>`
          : '';
        card.innerHTML = `
          <div class="card__top">
            <div data-avatar></div>
            <div class="card__rating">
              ${avg != null ? avg.toFixed(2) : '—'}
              <small>${t.review_count} ${reviewWord}</small>
            </div>
          </div>
          <div>
            <div class="card__name">${escape(t.name)}</div>
            <div class="card__subject">${escape(RB.localizeSubject(t.subject) || '—')}</div>
          </div>
          ${wtaLine}
          <div class="card__foot">
            <span data-stars></span>
            <span class="review__date">${footMeta}</span>
          </div>`;
        card.querySelector('[data-avatar]').replaceWith(RB.avatarEl(t.name, 48));
        RB.renderStars(card.querySelector('[data-stars]'), avg || 0, { size: 14 });
        grid.appendChild(card);
      });
    }

    // Re-render dynamic content when language changes.
    document.addEventListener('rb:lang', () => {
      renderChips();
      if (lastRows) renderGrid(lastRows);
    });

    function escape(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    qInput.addEventListener('input', () => {
      // Typing in the box implicitly drops out of smart-search mode — the
      // user is editing a regular query now.
      if (state.smart) clearSmart({ skipReload: true });
      state.q = qInput.value.trim();
      clearTimeout(debounce);
      debounce = setTimeout(loadTeachers, 200);
    });
    form.addEventListener('submit', (e) => { e.preventDefault(); state.q = qInput.value.trim(); loadTeachers(); });

    // ——— Smart search wiring
    const smartBtn = document.getElementById('smartBtn');
    const smartBanner = document.getElementById('smartBanner');
    const smartBannerText = document.getElementById('smartBannerText');
    const smartClearBtn = document.getElementById('smartClear');
    let lastSmartResponse = null;

    function showSmartBanner(text) {
      smartBannerText.textContent = text;
      smartBanner.hidden = false;
    }

    function clearSmart({ skipReload } = {}) {
      state.smart = false;
      lastSmartResponse = null;
      smartBanner.hidden = true;
      if (!skipReload) loadTeachers();
    }

    async function runSmartSearch() {
      const q = qInput.value.trim();
      if (q.length < 2) return;
      state.smart = true;
      loading.hidden = false;
      empty.hidden = true;
      grid.innerHTML = '';
      loading.textContent = RB.t('home.smart.loading');
      try {
        const resp = await RB.api('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q }),
        });
        lastSmartResponse = resp;
        renderSmartResponse(resp);
      } catch (e) {
        // Fall back to a regular keyword search so the user still sees
        // teachers — never leave the screen empty after pressing the button.
        showSmartBanner(RB.t('home.smart.error'));
        state.smart = false;
        loadTeachers();
      } finally {
        loading.hidden = true;
        loading.textContent = RB.t('home.loading');
      }
    }

    function renderSmartResponse(resp) {
      const lang = (RB.getLang && RB.getLang()) === 'zh' ? 'zh' : 'en';
      // When the backend falls back, it already returns a "smart search
      // unavailable" message in both languages — use the localized frontend
      // copy instead so we get one clean sentence, not two saying the same
      // thing back to back.
      const explain = resp.fallback
        ? RB.t('home.smart.fallback')
        : (lang === 'zh' ? resp.explanation_zh : resp.explanation_en);
      showSmartBanner(explain);
      if (!resp.teachers || !resp.teachers.length) {
        empty.hidden = false;
        empty.textContent = RB.t('home.smart.empty');
        lastRows = [];
        return;
      }
      lastRows = resp.teachers;
      renderGrid(resp.teachers);
    }

    smartBtn.addEventListener('click', runSmartSearch);
    smartClearBtn.addEventListener('click', () => clearSmart());

    // Re-localize the banner on language toggle without re-querying Groq.
    document.addEventListener('rb:lang', () => {
      if (state.smart && lastSmartResponse) renderSmartResponse(lastSmartResponse);
    });

    loadSubjects();
    loadTeachers();
  })();
  </script>

  <!-- ——— Star canvas (home page only, per handoff 3 spec).
       Full-page falling stars in the outer margins, attraction + constellation
       lines toward cursor/finger, amber cursor-crown. Single RAF, no per-frame
       DOM. Respects prefers-reduced-motion; runs on both pointer and touch. -->
  <script>
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var canvas = document.createElement('canvas');
    canvas.className = 'rb-star-canvas';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    var STAR_PATH = new Path2D('M12 2l2.95 5.98 6.6.96-4.78 4.66 1.13 6.57L12 17.58l-5.9 3.1 1.13-6.58L2.45 9.44l6.6-.96L12 2z');
    var HUES = ['oklch(0.72 0.14 70)', 'oklch(0.68 0.15 40)', 'oklch(0.75 0.12 90)'];
    var LINE_COL = 'oklch(0.42 0.12 35)';

    function drawStar(x, y, size, rot, color, alpha) {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(rot);
      var s = size / 24; ctx.scale(s, s); ctx.translate(-12, -12);
      ctx.fillStyle = color; ctx.globalAlpha = alpha;
      ctx.fill(STAR_PATH);
      ctx.restore();
    }

    var W, H;
    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    var mouse = { x: -9999, y: -9999, inside: false };
    window.addEventListener('mousemove', function (e) {
      mouse.x = e.clientX; mouse.y = e.clientY; mouse.inside = true;
    });
    window.addEventListener('mouseout', function (e) {
      if (!e.relatedTarget) { mouse.inside = false; mouse.x = mouse.y = -9999; }
    });
    // Touch support — finger acts as cursor while pressed
    function onTouch(e) {
      if (e.touches && e.touches.length) {
        var t = e.touches[0];
        mouse.x = t.clientX; mouse.y = t.clientY; mouse.inside = true;
      }
    }
    function onTouchEnd() { mouse.inside = false; mouse.x = mouse.y = -9999; }
    window.addEventListener('touchstart',  onTouch,    { passive: true });
    window.addEventListener('touchmove',   onTouch,    { passive: true });
    window.addEventListener('touchend',    onTouchEnd, { passive: true });
    window.addEventListener('touchcancel', onTouchEnd, { passive: true });

    // Desktop/tablet: ~2.25x the handoff baseline (32/63/24444).
    // Mobile (≤640, matching styles.css breakpoint): ~1.5x the baseline
    // (21/42/36667) so the narrow viewport fills without crowding.
    var isMobile = W <= 640;
    var target = isMobile
      ? Math.max(21, Math.min(42, Math.round(W * H / 36667)))
      : Math.max(32, Math.min(63, Math.round(W * H / 24444)));

    function makeFaller(top) {
      var side = Math.random() < 0.5 ? 'L' : 'R';
      var margin = W * (1 / 8);
      var x = side === 'L' ? Math.random() * margin : W - Math.random() * margin;
      return {
        x: x,
        y: top ? -20 - Math.random() * 60 : Math.random() * H,
        vx: 0, vy: 18 + Math.random() * 20,
        size: 10 + Math.random() * 12,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 1.2,
        alpha: 0.22 + Math.random() * 0.30,
        color: HUES[Math.floor(Math.random() * HUES.length)],
      };
    }

    var ATTR_R = 220, LINE_R = 180;
    var stars = [];
    var last = performance.now();

    // Stars must not enter the central content column (search bar, cards).
    // We compute the no-fly zone from the actual <main.container> rect each
    // frame so it tracks scroll, resize, and any layout the CSS does on home.
    // ZONE_PAD adds a small breathing gap so stars halt just before the
    // content edge instead of clipping it.
    var mainEl = document.querySelector('main.container');
    var ZONE_PAD = 12;
    function getZone() {
      if (!mainEl) return null;
      var r = mainEl.getBoundingClientRect();
      // Ignore degenerate / off-screen rects (pre-layout, hidden tab, etc.)
      if (r.width < 40 || r.height < 40) return null;
      return {
        left:   r.left   - ZONE_PAD,
        right:  r.right  + ZONE_PAD,
        top:    r.top    - ZONE_PAD,
        bottom: r.bottom + ZONE_PAD,
      };
    }

    // How long a star must sit pinned to the zone boundary before it starts
    // fading out. Without this, attracted stars pile up against the edge and
    // crowd it as more keep falling. Recycle keeps the population fresh.
    var STUCK_BEFORE_FADE = 3.0;     // seconds
    var FADE_RATE = 0.6;             // alpha per second

    function loop(now) {
      var dt = Math.min((now - last) / 1000, 0.05); last = now;
      while (stars.length < target) stars.push(makeFaller(stars.length > target * 0.4));

      var zone = getZone();

      ctx.clearRect(0, 0, W, H);

      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        if (mouse.inside) {
          var dx = mouse.x - s.x, dy = mouse.y - s.y;
          var d = Math.hypot(dx, dy);
          if (d < ATTR_R) {
            var f = (1 - d / ATTR_R) * 140;
            s.vx += (dx / (d + 0.1)) * f * dt;
            s.vy += (dy / (d + 0.1)) * f * dt - 50 * dt;
          }
        }
        s.vy += 22 * dt; s.vx *= 0.95;

        var nx = s.x + s.vx * dt * 8;
        var ny = s.y + s.vy * dt * 2.5;

        // No-fly zone clamp. If the star's next position would land inside
        // the central content rect, snap it back to the nearest edge and
        // zero the offending velocity component so it pins at the boundary
        // instead of jittering through it.
        var blocked = false;
        if (zone && nx > zone.left && nx < zone.right && ny > zone.top && ny < zone.bottom) {
          var dl = nx - zone.left;
          var dr = zone.right - nx;
          var dT = ny - zone.top;
          var dB = zone.bottom - ny;
          var minE = Math.min(dl, dr, dT, dB);
          if (minE === dl)      { nx = zone.left;   if (s.vx > 0) s.vx = 0; }
          else if (minE === dr) { nx = zone.right;  if (s.vx < 0) s.vx = 0; }
          else if (minE === dT) { ny = zone.top;    if (s.vy > 0) s.vy = 0; }
          else                  { ny = zone.bottom; if (s.vy < 0) s.vy = 0; }
          blocked = true;
        }

        s.x = nx;
        s.y = ny;
        s.rot += s.vrot * dt;

        // Stuck-at-boundary fade: after STUCK_BEFORE_FADE seconds against
        // the wall, alpha bleeds down so the star recycles. Free movement
        // resets the timer.
        if (blocked) {
          s.stuckTime = (s.stuckTime || 0) + dt;
          if (s.stuckTime > STUCK_BEFORE_FADE) {
            s.alpha -= FADE_RATE * dt;
          }
        } else {
          s.stuckTime = 0;
        }

        if (s.y > H + 30 || s.x < -40 || s.x > W + 40 || s.alpha <= 0.02) {
          Object.assign(s, makeFaller(true));
          s.stuckTime = 0;
        }
      }

      if (mouse.inside) {
        var near = stars
          .map(function (s) { return { s: s, d: Math.hypot(s.x - mouse.x, s.y - mouse.y) }; })
          .filter(function (p) { return p.d < LINE_R; })
          .sort(function (a, b) { return a.d - b.d; })
          .slice(0, 6);
        ctx.strokeStyle = LINE_COL; ctx.lineWidth = 1;
        for (var j = 0; j < near.length; j++) {
          ctx.globalAlpha = (1 - near[j].d / LINE_R) * 0.6;
          ctx.beginPath();
          ctx.moveTo(mouse.x, mouse.y);
          ctx.lineTo(near[j].s.x, near[j].s.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        var grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 36);
        grad.addColorStop(0, 'oklch(0.72 0.14 70 / 0.30)');
        grad.addColorStop(1, 'oklch(0.72 0.14 70 / 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 36, 0, Math.PI * 2); ctx.fill();
      }

      for (var k = 0; k < stars.length; k++) {
        var sk = stars[k];
        drawStar(sk.x, sk.y, sk.size, sk.rot, sk.color, sk.alpha);
      }
      if (mouse.inside) drawStar(mouse.x, mouse.y, 16, now / 500, 'oklch(0.72 0.14 70)', 0.85);

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ——— Cursor hint (desktop only). Fades once the cursor reaches the hint
       box (+60px grace) OR after 14s. Hidden on touch + reduced-motion. -->
  <script>
  (function () {
    if (!window.matchMedia) return;
    if (window.matchMedia('(hover: none)').matches) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var wrap = document.createElement('div');
    wrap.setAttribute('aria-hidden', 'true');
    wrap.style.cssText = [
      'position:fixed',
      'right:clamp(16px,4vw,52px)',
      'top:50%',
      'transform:translateY(-50%) translateX(0)',
      'opacity:1',
      'transition:opacity 0.6s ease,transform 0.6s ease',
      'pointer-events:none',
      'z-index:50',
      'display:flex',
      'flex-direction:column',
      'align-items:center',
      'gap:10px',
    ].join(';');
    wrap.innerHTML = [
      '<div style="position:relative;width:56px;height:56px">',
      '  <div class="rb-cursor-orbit" style="position:absolute;inset:0;border:1.5px dashed var(--accent);border-radius:50%;opacity:0.45"></div>',
      '  <div class="rb-cursor-dot"   style="position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);top:50%;left:50%;margin-left:-4px;margin-top:-4px"></div>',
      '  <svg width="22" height="22" viewBox="0 0 24 24" style="position:absolute;top:50%;left:50%;transform:translate(-40%,-40%);color:var(--accent-ink)">',
      '    <path d="M4 3l7 17 2.5-6.5L20 11z" fill="currentColor"/>',
      '  </svg>',
      '</div>',
      // The hint is injected after DOMContentLoaded, so applyI18n() has
      // already run. Set the translated text directly via RB.t().
      '<div class="serif" data-i18n="home.cursorHint" style="font-style:italic;color:var(--accent-ink);font-size:15px;white-space:nowrap;letter-spacing:-0.005em">' + (window.RB ? RB.t('home.cursorHint') : 'drag your cursor') + '</div>',
      '<svg width="16" height="24" viewBox="0 0 16 24" style="color:var(--accent-ink);opacity:0.6">',
      '  <path d="M8 2v18M2 14l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>',
      '</svg>',
    ].join('');
    document.body.appendChild(wrap);

    var GRACE = 60;
    var fired = false;
    function fadeOut() {
      if (fired) return;
      fired = true;
      wrap.style.opacity = '0';
      wrap.style.transform = 'translateY(-50%) translateX(20px)';
      window.removeEventListener('mousemove', onMove);
      clearTimeout(timer);
      // Remove from DOM after the fade completes so it can't intercept anything.
      setTimeout(function () { wrap.remove(); }, 700);
    }
    function onMove(e) {
      var r = wrap.getBoundingClientRect();
      if (
        e.clientX >= r.left  - GRACE &&
        e.clientX <= r.right + GRACE &&
        e.clientY >= r.top   - GRACE &&
        e.clientY <= r.bottom + GRACE
      ) fadeOut();
    }
    window.addEventListener('mousemove', onMove);
    var timer = setTimeout(fadeOut, 14000);
  })();
  </script>
</body>
</html>
