<!doctype html>
<html lang="en" data-i18n-page-title="admin.pageTitle">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rate BIPH — admin</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body data-page="admin">
  <div data-topnav></div>

  <main class="container container--narrow">
    <div class="eyebrow" data-i18n="admin.eyebrow">MODERATION</div>
    <h1 class="page-title serif" data-i18n="admin.heading">Admin</h1>
    <p class="page-lede" data-i18n="admin.lede">Token-gated tools for the student moderator. Approve teacher submissions or hide individual reviews.</p>

    <div id="authCard" class="form-card">
      <div class="field">
        <div class="field__row"><label class="field__label" for="token" data-i18n="admin.token.label">Admin token</label></div>
        <input id="token" class="input" type="password" data-i18n-placeholder="admin.token.placeholder" placeholder="Paste admin token" />
      </div>
      <div id="authStatus" class="form-status"></div>
      <div class="form-actions">
        <button id="loginBtn" class="btn btn--primary" data-i18n="admin.unlock">Unlock</button>
      </div>
    </div>

    <section id="panel" hidden>
      <div class="reviews-header">
        <div class="serif reviews-header__title" data-i18n="admin.subs.title">Pending submissions</div>
        <button id="refreshBtn" class="btn btn--ghost btn--sm" data-i18n="admin.subs.refresh">Refresh</button>
      </div>
      <div id="subsList"></div>
      <div id="subsEmpty" class="empty" hidden data-i18n="admin.subs.empty">No pending submissions.</div>

      <div class="reviews-header" style="margin-top:40px">
        <div class="serif reviews-header__title" data-i18n="admin.sugs.title">Suggestions inbox</div>
        <label class="reviews-header__toggle">
          <input type="checkbox" id="showResolved" /> <span data-i18n="admin.sugs.showResolved">Show resolved</span>
        </label>
      </div>
      <div id="sugsList"></div>
      <div id="sugsEmpty" class="empty" hidden data-i18n="admin.sugs.empty">No suggestions.</div>

      <div class="reviews-header" style="margin-top:40px">
        <div class="serif reviews-header__title" data-i18n="admin.hide.title">Hide a review</div>
      </div>
      <div class="form-card">
        <div class="field">
          <div class="field__row"><label class="field__label" for="reviewId" data-i18n="admin.hide.label">Review ID (UUID)</label></div>
          <input id="reviewId" class="input" data-i18n-placeholder="admin.hide.placeholder" placeholder="paste review id" />
        </div>
        <div id="hideStatus" class="form-status"></div>
        <div class="form-actions">
          <button id="hideBtn" class="btn btn--primary" data-i18n="admin.hide.button">Hide review</button>
        </div>
      </div>
    </section>
  </main>

  <div data-footer></div>
  <script src="app.js"></script>
  <script>
  (function () {
    let token = sessionStorage.getItem('rb.admin');

    async function auth(path, opts = {}) {
      return RB.api(path, { ...opts, headers: { Authorization: `Bearer ${token}`, ...(opts.headers || {}) } });
    }

    function escape(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    // Cache the last loaded lists so we can re-render on lang toggle without
    // re-fetching from the admin API.
    let lastSubs = null;
    let lastSugs = null;

    async function loadSubs() {
      const subs = await auth('/api/admin/submissions');
      lastSubs = subs;
      renderSubs(subs);
    }

    function renderSubs(subs) {
      const host = document.getElementById('subsList');
      host.innerHTML = '';
      const empty = document.getElementById('subsEmpty');
      if (!subs.length) { empty.hidden = false; return; }
      empty.hidden = true;
      subs.forEach(s => {
        const row = document.createElement('div');
        row.className = 'admin-sub';
        const courses = (s.courses && s.courses.length) ? ' · ' + escape(s.courses.join(', ')) : '';
        row.innerHTML = `
          <div class="admin-sub__meta">
            <div class="admin-sub__name">${escape(s.name)}</div>
            <div class="admin-sub__subject">${escape(s.subject || '—')}${courses} · ${RB.relDate(s.created_at) || ''}</div>
          </div>
          <div class="admin-sub__actions">
            <button class="btn btn--accent btn--sm" data-act="approve">${RB.t('admin.subs.approve')}</button>
            <button class="btn btn--ghost btn--sm" data-act="reject">${RB.t('admin.subs.reject')}</button>
          </div>`;
        row.querySelector('[data-act="approve"]').onclick = async () => {
          try { await auth(`/api/admin/submissions/${s.id}/approve`, { method: 'POST' }); RB.toast(RB.t('admin.subs.approved')); loadSubs(); }
          catch (e) { RB.toast(e.message); }
        };
        row.querySelector('[data-act="reject"]').onclick = async () => {
          try { await auth(`/api/admin/submissions/${s.id}/reject`, { method: 'POST' }); RB.toast(RB.t('admin.subs.rejected')); loadSubs(); }
          catch (e) { RB.toast(e.message); }
        };
        host.appendChild(row);
      });
    }

    async function loadSugs() {
      const showResolved = document.getElementById('showResolved').checked;
      const sugs = await auth(`/api/admin/suggestions${showResolved ? '?include_resolved=true' : ''}`);
      lastSugs = sugs;
      renderSugs(sugs);
    }

    function renderSugs(sugs) {
      const host = document.getElementById('sugsList');
      host.innerHTML = '';
      const empty = document.getElementById('sugsEmpty');
      if (!sugs.length) { empty.hidden = false; return; }
      empty.hidden = true;
      sugs.forEach(s => {
        const row = document.createElement('div');
        row.className = 'admin-sug' + (s.is_resolved ? ' admin-sug--resolved' : '');
        const when = RB.relDate(s.created_at) || '';
        const state = s.is_resolved
          ? `<span class="admin-sug__state">${RB.t('admin.sugs.resolved', { when: RB.relDate(s.resolved_at) || '' })}</span>`
          : `<span class="admin-sug__state admin-sug__state--open">${RB.t('admin.sugs.open')}</span>`;
        const actionBtn = s.is_resolved
          ? `<button class="btn btn--ghost btn--sm" data-act="reopen">${RB.t('admin.sugs.reopen')}</button>`
          : `<button class="btn btn--accent btn--sm" data-act="resolve">${RB.t('admin.sugs.markResolved')}</button>`;
        row.innerHTML = `
          <div class="admin-sug__head">
            ${state}
            <span class="admin-sug__when">${when}</span>
          </div>
          <div class="admin-sug__body">${escape(s.body)}</div>
          <div class="admin-sub__actions">${actionBtn}</div>`;
        const act = row.querySelector('[data-act]');
        act.onclick = async () => {
          const path = s.is_resolved
            ? `/api/admin/suggestions/${s.id}/reopen`
            : `/api/admin/suggestions/${s.id}/resolve`;
          try {
            await auth(path, { method: 'POST' });
            RB.toast(s.is_resolved ? RB.t('admin.sugs.reopened') : RB.t('admin.sugs.markedResolved'));
            loadSugs();
          } catch (e) { RB.toast(e.message); }
        };
        host.appendChild(row);
      });
    }

    // Re-render cached lists when the language toggles.
    document.addEventListener('rb:lang', () => {
      if (lastSubs) renderSubs(lastSubs);
      if (lastSugs) renderSugs(lastSugs);
    });

    async function unlock() {
      token = document.getElementById('token').value.trim();
      const status = document.getElementById('authStatus');
      status.className = 'form-status';
      try {
        await auth('/api/admin/submissions');
        sessionStorage.setItem('rb.admin', token);
        document.getElementById('authCard').hidden = true;
        document.getElementById('panel').hidden = false;
        loadSubs();
        loadSugs();
      } catch (e) {
        status.textContent = RB.t('admin.invalid');
        status.classList.add('form-status--err');
      }
    }

    document.getElementById('loginBtn').addEventListener('click', unlock);
    document.getElementById('token').addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });
    document.getElementById('refreshBtn').addEventListener('click', () => { loadSubs(); loadSugs(); });
    document.getElementById('showResolved').addEventListener('change', loadSugs);
    document.getElementById('hideBtn').addEventListener('click', async () => {
      const rid = document.getElementById('reviewId').value.trim();
      const st = document.getElementById('hideStatus');
      st.className = 'form-status';
      if (!rid) { st.textContent = RB.t('admin.hide.empty'); st.classList.add('form-status--err'); return; }
      try {
        await auth(`/api/admin/reviews/${rid}/hide`, { method: 'POST' });
        RB.toast(RB.t('admin.hide.toast'));
        document.getElementById('reviewId').value = '';
      } catch (e) {
        st.textContent = e.message; st.classList.add('form-status--err');
      }
    });

    if (token) {
      document.getElementById('token').value = token;
      unlock();
    }
  })();
  </script>
</body>
</html>
